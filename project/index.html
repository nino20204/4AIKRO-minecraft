<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>4aikro Store</title>
  <style>
    /* خلفية عامة */
body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e1b4b, #2e1065);
  color: white;
  overflow-x: hidden;
}

/* particles container */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
}

/* particle */
.particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.4;
  animation: float linear infinite;
}

/* حركة */
@keyframes float {
  from {
    transform: translateY(100vh);
  }
  to {
    transform: translateY(-10vh);
  }
}

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 80px;
      height: 80px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #7c3aed;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #6d28d9;
    }
  </style>
</head>
<body>

<h1>🛒 4aikro Store</h1>

<div id="products" class="grid"></div>

<script src="script.js"></script>
</body>
</html>
