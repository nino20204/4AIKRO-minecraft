<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>4aikro Store</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 80px;
      height: 80px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #7c3aed;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #6d28d9;
    }
  </style>
</head>
<body>

<h1>🛒 4aikro Store</h1>

<div id="products" class="grid"></div>

<script src="script.js"></script>
</body>
</html>
